<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>거래량 비율 랭킹 TOP10</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-zinc-100">

<div id="root"></div>

<script type="text/babel">

const { useState } = React

function App() {

  const [stocks, setStocks] = useState([])
  const [loading, setLoading] = useState(false)

  const API =
    "https://stock-volume-scanner.onrender.com/scan"

  async function runScanner() {

    setLoading(true)

    try {

      const response = await fetch(API)

      const data = await response.json()

      setStocks(data)

    } catch(e) {

      alert("서버 연결 실패")

    }

    setLoading(false)
  }

  return (

    <div className="max-w-7xl mx-auto p-5">

      <div className="bg-white rounded-3xl shadow-lg p-6 mb-5">

        <h1 className="text-3xl font-bold">
          거래량 비율 랭킹 TOP10
        </h1>

        <p className="text-zinc-500 mt-2">
          최근 3개월 최대 거래량 기준
        </p>

        <button
          onClick={runScanner}
          className="mt-5 px-5 py-3 bg-black text-white rounded-xl font-bold"
        >
          {loading ? "검색중..." : "검색 시작"}
        </button>

      </div>

      <div className="bg-white rounded-3xl shadow-lg p-5 overflow-x-auto">

        <table className="w-full text-sm">

          <thead>

            <tr className="border-b">

              <th className="p-3 text-left">종목</th>

              <th className="p-3 text-left">
                거래량순위
              </th>

              <th className="p-3 text-left">
                비율
              </th>

              <th className="p-3 text-left">
                최근최대거래량
              </th>

              <th className="p-3 text-left">
                최근최대발생일
              </th>

              <th className="p-3 text-left">
                몇일전
              </th>

              <th className="p-3 text-left">
                당시종가
              </th>

              <th className="p-3 text-left">
                현재종가
              </th>

              <th className="p-3 text-left">
                수익률
              </th>

              <th className="p-3 text-left">
                역대최대거래량
              </th>

              <th className="p-3 text-left">
                역대최대발생일
              </th>

              <th className="p-3 text-left">
                역대최대시점
              </th>

            </tr>

          </thead>

          <tbody>

            {stocks.map((s, i) => (

              <tr
                key={i}
                className="border-b hover:bg-zinc-50"
              >

                <td className="p-3">

                  <div className="font-bold">
                    {s.name}
                  </div>

                  <div className="text-xs text-zinc-500">
                    {s.code}
                  </div>

                </td>

                <td className="p-3 font-bold text-red-500">
                  {s.volumeRank}위
                </td>

                <td className="p-3 font-bold text-blue-600">
                  {s.volumeRatio}%
                </td>

                <td className="p-3">
                  {s.recentMax}
                </td>

                <td className="p-3">
                  {s.recentDate}
                </td>

                <td className="p-3">
                  {s.recentDaysAgo}일전
                </td>

                <td className="p-3">
                  {s.recentClose}원
                </td>

                <td className="p-3 font-bold">
                  {s.currentClose}원
                </td>

                <td
                  className={
                    "p-3 font-bold " +
                    (
                      s.profitRate >= 0
                      ? "text-red-500"
                      : "text-blue-500"
                    )
                  }
                >
                  {s.profitRate}%
                </td>

                <td className="p-3">
                  {s.allTimeMax}
                </td>

                <td className="p-3">
                  {s.allTimeDate}
                </td>

                <td className="p-3">
                  {s.allTimeMonthsAgo}개월전
                </td>

              </tr>

            ))}

          </tbody>

        </table>

      </div>

    </div>

  )

}

ReactDOM
.createRoot(
  document.getElementById("root")
)
.render(<App />)

</script>

</body>
</html>
